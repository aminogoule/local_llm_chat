<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>imsoft chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="collapsed">
      <div class="sidebar-head">
        <button id="new-chat" class="btn-primary" title="Новый диалог">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 5v14m-7-7h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Новый чат
        </button>
      </div>
      <nav id="history" class="history"></nav>
      <div class="sidebar-foot">
        <div class="field">
          <label for="model">Модель</label>
          <select id="model"></select>
        </div>
        <details class="settings">
          <summary>Параметры</summary>
          <div class="field">
            <label for="system">Системный промпт</label>
            <textarea id="system" rows="3" placeholder="Ты — полезный ассистент."></textarea>
          </div>
          <div class="field">
            <label for="temperature">Температура: <span id="temp-val">0.7</span></label>
            <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7">
          </div>
          <div class="field">
            <label for="max-tokens">Макс. токенов (-1 = без лимита)</label>
            <input type="number" id="max-tokens" value="-1" min="-1" step="64">
          </div>
          <label class="check"><input type="checkbox" id="stream" checked> Потоковый вывод</label>
        </details>
        <div class="status" id="status">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">соединение…</span>
        </div>
      </div>
    </aside>

    <main id="main">
      <header id="topbar">
        <button id="toggle-sidebar" class="icon-btn" title="Меню">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="title">🌙 imsoft <span class="muted" id="cur-model">local LLM</span></div>
        <button id="theme-btn" class="icon-btn" title="Тема">◐</button>
      </header>

      <div id="messages" class="messages">
        <div class="empty" id="empty-state">
          <div class="empty-logo">🌙</div>
          <h1>Локальный чат</h1>
          <p>Работает на LMStudio. Спросите что угодно.</p>
        </div>
      </div>

      <div id="composer">
        <div class="composer-inner">
          <textarea id="input" rows="1" placeholder="Сообщение…  (Enter — отправить, Shift+Enter — перенос)"></textarea>
          <button id="send" class="send-btn" title="Отправить">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 11l18-8-8 18-2-7-8-3z"/></svg>
          </button>
          <button id="stop" class="send-btn stop hidden" title="Остановить">
            <svg viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="hint">Ответы генерируются локальной моделью и могут быть неточными.</div>
      </div>
    </main>

    <div id="backdrop" class="backdrop"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
